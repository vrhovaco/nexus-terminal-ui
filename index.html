<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS TERMINAL • Crypto Trading</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;500;600;700&family=Audiowide&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>

</head>
<body>
    <div class="grid-overlay"></div>
    
    <div class="container">
        <!-- Header -->
        <header>
            <div class="logo">
                <div class="logo-icon">N</div>
                <div class="logo-text">NEXUS</div>
            </div>
            <div class="header-stats">
                <div class="stat-item">
                    <div class="stat-label">Market Cap</div>
                    <div class="stat-value">$2.34T</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">24h Volume</div>
                    <div class="stat-value">$98.2B</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">BTC Dominance</div>
                    <div class="stat-value positive">54.2%</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">Fear & Greed</div>
                    <div class="stat-value negative">32</div>
                </div>
            </div>
        </header>

        <!-- Main Grid -->
        <div class="main-grid">
            <!-- Watchlist Panel -->
            <div class="panel">
                <div class="panel-header">
                    <div class="panel-title">Watchlist</div>
                    <div class="panel-action">+ Add</div>
                </div>
                <div class="watchlist" id="watchlist"></div>
            </div>

            <!-- Chart Section -->
            <div class="chart-section">
                <div class="panel chart-panel">
                    <div class="panel-header">
                        <div class="panel-title" id="selectedCrypto">BITCOIN</div>
                        <div class="chart-controls">
                            <button class="time-button active" data-period="1H">1H</button>
                            <button class="time-button" data-period="24H">24H</button>
                            <button class="time-button" data-period="7D">7D</button>
                            <button class="time-button" data-period="1M">1M</button>
                            <button class="time-button" data-period="1Y">1Y</button>
                        </div>
                    </div>
                    <canvas id="mainChart"></canvas>
                </div>

                <div class="panel">
                    <div class="panel-header">
                        <div class="panel-title">Market Stats</div>
                    </div>
                    <div class="stats-grid">
                        <div class="stat-card">
                            <div class="stat-card-label">24h High</div>
                            <div class="stat-card-value" id="high24h">$67,234</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-card-label">24h Low</div>
                            <div class="stat-card-value" id="low24h">$65,123</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-card-label">Volume</div>
                            <div class="stat-card-value" id="volume">$28.4B</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-card-label">Market Cap</div>
                            <div class="stat-card-value" id="marketCap">$1.31T</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Order & Portfolio Panel -->
            <div style="display: flex; flex-direction: column; gap: 25px;">
                <div class="panel">
                    <div class="panel-header">
                        <div class="panel-title">Trade</div>
                    </div>
                    <div class="order-tabs">
                        <button class="tab-button active buy">BUY</button>
                        <button class="tab-button sell">SELL</button>
                    </div>
                    <div class="input-group">
                        <label class="input-label">Amount (BTC)</label>
                        <input type="number" class="input-field" placeholder="0.00" step="0.0001">
                    </div>
                    <div class="input-group">
                        <label class="input-label">Price (USD)</label>
                        <input type="number" class="input-field" placeholder="0.00" value="66543">
                    </div>
                    <div class="input-group">
                        <label class="input-label">Total (USD)</label>
                        <input type="number" class="input-field" placeholder="0.00" disabled>
                    </div>
                    <button class="order-button">EXECUTE BUY</button>
                </div>

                <div class="panel">
                    <div class="panel-header">
                        <div class="panel-title">Portfolio</div>
                    </div>
                    <div class="portfolio-summary">
                        <div class="portfolio-value">$124,563.89</div>
                        <div class="portfolio-change">+$4,231.45 (3.52%)</div>
                    </div>
                    <div class="holdings" id="holdings"></div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
